{% extends 'base.html' %}
{% block content %}
<div class="card center">
  <h1>QR de asistencia</h1>
  <p class="muted">Este QR cambia cada 30 segundos. Faltan {{ seconds_left }} segundos para el próximo cambio.</p>
  <img class="qrimg" src="{{ qr_img_url }}" alt="QR de asistencia">
  <p style="margin-top:16px"><a class="btn" href="{{ link }}">Abrir formulario</a></p>
  <p class="muted" style="word-break:break-all">{{ link }}</p>
</div>
<script>
  setTimeout(function(){ window.location.reload(); }, 1000 * {{ seconds_left }} + 300);
</script>
{% endblock %}
