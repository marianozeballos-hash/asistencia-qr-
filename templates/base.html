<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Asistencia QR{% endblock %}</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: #f4f7fb; color: #111827; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 20px; }
    .card { background: white; border-radius: 18px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,.08); margin-bottom: 16px; }
    h1, h2, h3 { margin-top: 0; }
    a { color: #2563eb; word-break: break-all; }
    input, textarea, button { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #d1d5db; box-sizing: border-box; margin-top: 8px; margin-bottom: 12px; }
    button { background: #111827; color: white; border: 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #e5e7eb; text-align: left; }
    .flash { background: #ecfeff; border: 1px solid #a5f3fc; padding: 12px; border-radius: 12px; margin-bottom: 12px; }
    .nav a { margin-right: 12px; }
    .center { text-align: center; }
    img.qr { max-width: 320px; width: 100%; height: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card nav">
      <a href="/admin/qr">QR</a>
      <a href="/admin/roster">Padrón</a>
      <a href="/admin/report">Reporte</a>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
