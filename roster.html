{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h1>Padrón</h1>
  <p class="muted">Subí un CSV con columnas <strong>nombre,apellido</strong>.</p>
  <form method="post" enctype="multipart/form-data">
    <p><input type="file" name="file" accept=".csv"></p>
    <button type="submit">Cargar padrón</button>
  </form>
</div>
<div class="card">
  <h2>Alumnos cargados ({{ roster|length }})</h2>
  <table>
    <thead><tr><th>Apellido</th><th>Nombre</th></tr></thead>
    <tbody>
      {% for row in roster %}<tr><td>{{ row['apellido'] }}</td><td>{{ row['nombre'] }}</td></tr>{% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
