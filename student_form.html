{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 560px; margin: 0 auto;">
  <div class="badge" style="background: rgba(17,24,39,.06); color: var(--text); border-color: var(--line);">Registro del alumno</div>
  <h1>Registrar asistencia</h1>
  {% if token_valid %}
    <form method="post">
      <input type="hidden" name="token" value="{{ token }}">
      <label>Nombre</label>
      <input type="text" name="first_name" placeholder="Ej.: Juan" autocomplete="given-name" required>
      <label>Apellido</label>
      <input type="text" name="last_name" placeholder="Ej.: Pérez" autocomplete="family-name" required>
      <button class="btn btn-primary" type="submit">Enviar asistencia</button>
    </form>
  {% else %}
    <p>Este enlace ya venció. Escaneá nuevamente el QR que está mostrando el docente.</p>
  {% endif %}
</div>
{% endblock %}
