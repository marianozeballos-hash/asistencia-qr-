<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asistencia QR</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;background:#f6f7fb;color:#111827}
    .wrap{max-width:820px;margin:0 auto;padding:24px}
    .card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.08);margin-bottom:16px}
    input,button{font:inherit}
    input[type=text],input[type=file],input[type=date]{width:100%;padding:14px 16px;border:1px solid #d1d5db;border-radius:12px;box-sizing:border-box}
    button,.btn{display:inline-block;background:#111827;color:#fff;text-decoration:none;padding:12px 16px;border:none;border-radius:12px;cursor:pointer}
    .btn.secondary{background:#e5e7eb;color:#111827}
    .btnrow{display:flex;gap:12px;flex-wrap:wrap}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:10px;border-bottom:1px solid #e5e7eb}
    h1,h2{margin:0 0 12px}
    .flash{padding:12px 14px;border-radius:12px;background:#eef2ff;margin-bottom:12px}
    .muted{color:#6b7280}
    .center{text-align:center}
    .qrimg{width:320px;max-width:100%;border-radius:18px;background:#fff;padding:12px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
  </style>
</head>
<body>
  <div class="wrap">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
