{% extends 'base.html' %}
{% block content %}
<div class="card center">
  <div class="badge" style="background: rgba(17,24,39,.06); color: var(--text); border-color: var(--line);">Modo docente</div>
  <h1>QR de asistencia</h1>
  <p>Este QR se renueva automáticamente cada {{ interval }} segundos.</p>
  <img id="qr" class="qr" src="{{ url_for('qr_png') }}?t={{ range(1, 999999) | random }}" alt="QR de asistencia">
  <p class="big"><span id="countdown">{{ interval }}</span>s</p>
  <p class="muted">Cuando llegue a cero, se actualiza solo.</p>
  <div class="copy-box" style="max-width: 720px; margin: 12px auto 0;">{{ current_url }}</div>
</div>
<script>
  let seconds = {{ interval }};
  const countdownEl = document.getElementById('countdown');
  const qr = document.getElementById('qr');
  setInterval(() => {
    seconds -= 1;
    if (seconds <= 0) {
      seconds = {{ interval }};
      qr.src = "{{ url_for('qr_png') }}?t=" + Date.now();
    }
    countdownEl.textContent = seconds;
  }, 1000);
</script>
{% endblock %}
